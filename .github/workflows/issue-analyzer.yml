name: Issue Analyzer

on:
  issues:
    types: [opened, edited]

jobs:
  format-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Format issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash"
          prompt: |
            You are a GitHub issue formatter for a Tetris game project (vanilla JS/HTML/CSS, no dependencies).
            An issue was just ${{ github.event.action }} with the following details:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}
            - Author: ${{ github.event.issue.user.login }}

            Your tasks:
            1. **Add labels** based on the issue content. Use only these labels:
               - `bug` — something is broken or behaving incorrectly
               - `enhancement` — new feature or improvement request
               - `question` — asking for help or clarification
               - `documentation` — docs need updating
               - `good first issue` — simple, beginner-friendly task
               - `duplicate` — if it seems like a known/repeated problem

            2. **Post a comment** on the issue using the exact GitHub-flavored Markdown (GFM) template below.
               Render all formatting as valid GFM: use `##` for headings, `**text**` for bold, `-` for bullet lists,
               and wrap code/commands in backticks. Do NOT escape newlines or quotes inside the comment body.

            Use this exact template for the comment body (fill in the bracketed placeholders):

            ---
            ## Thanks for opening this issue, @[AUTHOR]! 👋

            [1–2 sentence friendly summary of what the issue is about.]

            ---

            ## 📋 Formatted Report

            | Field | Details |
            |-------|---------|
            | **Type** | [Bug / Feature Request / Question / Other] |
            | **Summary** | [One clear sentence describing the problem or request] |

            [Include the section below ONLY for bugs:]
            ### 🔁 Steps to Reproduce
            [If provided, list them. If missing, write: "Please provide steps to reproduce this issue."]

            ### ✅ Expected Behavior
            [What should happen instead.]

            ### 🏷️ Labels Applied
            - `[label]` — [reason]

            ---

            *Thank you for contributing to this project! We'll review this issue shortly.*
            ---

            Use the `gh` CLI to apply labels and post the comment. Example commands:
              gh issue edit ${{ github.event.issue.number }} --add-label "bug" --repo ${{ github.repository }}
              gh issue comment ${{ github.event.issue.number }} --body "..." --repo ${{ github.repository }}
            Be concise, helpful, and friendly. Do not over-engineer the response.